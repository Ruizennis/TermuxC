site_name: TermuxC Wiki
repo_name: Ruizennis/TermuxC
repo_url: https://github.com/Ruizennis/TermuxC
edit_uri: edit/main/docs/

theme:
  name: material
  features:
    - search.highlight
    - search.share
markdown_extensions:
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - admonition
  - attr_list
nav:
  - Home: index.md
  - Full Explanation: Full_explanation.md
  - Individual Explanations:
    - Imports: Explanation_Imports.md
    - Configuration: Explanation_Config.md
    - Tmux Support: Explanation_Tmuxsupport.md
    - Copy Function: Explanation_Copy.md
    - Main Function: Explanation_main.md
    - File Flag: Explanation_fileflag.md
    - Interactive Flag: Explanation_interactiveflag.md
    - Help Flag: Explanation_helpflag.md
    - Version Flag: Explanation_versionflag.md

